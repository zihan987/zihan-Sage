name: Release Desktop App
permissions:
    contents: write
    
on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:


jobs:
  build-and-release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: aarch64
            target: aarch64-apple-darwin
          - os: macos-latest
            arch: x86_64
            target: x86_64-apple-darwin
          - os: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/desktop/ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/desktop/tauri
          # The cache key is built based on the runner OS and the hash of Cargo.lock
          # Enabling cache-all-crates ensures that all crates are cached, not just the ones in the workspace
          cache-all-crates: "true"
          # Shared key to allow sharing cache between jobs if needed (though matrix jobs are separate)
          shared-key: "desktop-build"

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: 3.11
          activate-environment: sage-desktop-env
          auto-activate-base: false
          architecture: ${{ matrix.arch == 'x86_64' && 'x64' || 'arm64' }}
          channels: conda-forge,defaults
          channel-priority: flexible

      - name: Cache Python Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/Library/Caches/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('app/desktop/core/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install System Dependencies
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg
          
      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: Build Application (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash -l {0}
        env:
          PIP_INDEX_URL: https://pypi.org/simple
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          chmod +x app/desktop/scripts/build.sh
          chmod +x app/desktop/scripts/generate_cert.sh
          app/desktop/scripts/build.sh release

      - name: Build Application (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          PIP_INDEX_URL: https://pypi.org/simple
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          ./app/desktop/scripts/build_windows.ps1 release
          
      - name: Build Application (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash -l {0}
        env:
          PIP_INDEX_URL: https://pypi.org/simple
        run: |
          chmod +x app/desktop/scripts/build.sh
          chmod +x app/desktop/scripts/generate_cert.sh
          app/desktop/scripts/build.sh release

      - name: Rename Artifacts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          VERSION="${GITHUB_REF#refs/tags/desktop-v}"
          
          # Rename DMG
          cd app/desktop/tauri/target/release/bundle/dmg/
          for file in *.dmg; do
            mv "$file" "SageAI-${VERSION}-${{ matrix.arch }}.dmg"
          done
          
          # Rename Updater Bundles (tar.gz & sig) if exist
          cd ../macos/
          for file in *.tar.gz; do
            mv "$file" "SageAI-${VERSION}-${{ matrix.arch }}.app.tar.gz"
          done
          for file in *.tar.gz.sig; do
            mv "$file" "SageAI-${VERSION}-${{ matrix.arch }}.app.tar.gz.sig"
          done

      - name: Rename Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF}" -replace '^refs/tags/desktop-v', ''
          $nsisDir = "app/desktop/tauri/target/release/bundle/nsis"
          $msiDir = "app/desktop/tauri/target/release/bundle/msi"
          
          # Rename Installer
          if (Test-Path $nsisDir) {
            Get-ChildItem $nsisDir -Filter *.exe | ForEach-Object {
              Move-Item $_.FullName (Join-Path $nsisDir ("SageAI-$version-x86_64-setup.exe")) -Force
            }
            
            # Rename Updater Bundles (zip & sig)
            Get-ChildItem $nsisDir -Filter *.zip | ForEach-Object {
              Move-Item $_.FullName (Join-Path $nsisDir ("SageAI-$version-x86_64-setup.zip")) -Force
            }
            Get-ChildItem $nsisDir -Filter *.zip.sig | ForEach-Object {
              Move-Item $_.FullName (Join-Path $nsisDir ("SageAI-$version-x86_64-setup.zip.sig")) -Force
            }
          }

          # Rename Installer (MSI)
          if (Test-Path $msiDir) {
            Get-ChildItem $msiDir -Filter *.msi | ForEach-Object {
              Move-Item $_.FullName (Join-Path $msiDir ("SageAI-$version-x86_64-setup.msi")) -Force
            }
            
            # Rename Updater Bundles (zip & sig)
            Get-ChildItem $msiDir -Filter *.zip | ForEach-Object {
              Move-Item $_.FullName (Join-Path $msiDir ("SageAI-$version-x86_64-setup.msi.zip")) -Force
            }
            Get-ChildItem $msiDir -Filter *.zip.sig | ForEach-Object {
              Move-Item $_.FullName (Join-Path $msiDir ("SageAI-$version-x86_64-setup.msi.zip.sig")) -Force
            }
          }

      - name: Release (macOS)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'macos-latest'
        with:
          files: |
            app/desktop/tauri/target/release/bundle/dmg/*.dmg
            app/desktop/tauri/target/release/bundle/macos/*.app.tar.gz
            app/desktop/tauri/target/release/bundle/macos/*.app.tar.gz.sig

      - name: Release (Windows)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows-latest'
        with:
          files: |
            app/desktop/tauri/target/release/bundle/nsis/*.exe
            app/desktop/tauri/target/release/bundle/nsis/*.zip
            app/desktop/tauri/target/release/bundle/nsis/*.zip.sig
            app/desktop/tauri/target/release/bundle/msi/*.msi
            app/desktop/tauri/target/release/bundle/msi/*.zip
            app/desktop/tauri/target/release/bundle/msi/*.zip.sig

      - name: Release (Linux)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest'
        with:
          files: |
            app/desktop/tauri/target/release/bundle/deb/*.deb
